<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Page not found - Top Edge Window Tint</title>
<meta name="description" content="That page took a wrong turn. Head back to Top Edge window tinting in Clovis, CA." />
<meta name="theme-color" content="#0a0e13" />
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" />

<style>
  :root{
    --bg:#0a0e13;
    --surface:#131a23;
    --line:rgba(255,255,255,.08);
    --line-2:rgba(255,255,255,.14);
    --ink:#eef2f7;
    --ink-2:#a9b4c2;
    --ink-3:#6b7785;
    --accent:#3ecbff;
    --accent-2:#7fe0ff;
    --accent-deep:#1a8cb8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Satoshi',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    min-height:100vh;display:grid;place-items:center;padding:32px 24px;
    background-image:
      radial-gradient(800px 400px at 80% 10%, rgba(62,203,255,.08), transparent 60%),
      radial-gradient(600px 400px at 10% 90%, rgba(26,140,184,.06), transparent 60%);
  }
  h1,h2{font-family:'Clash Display',sans-serif;letter-spacing:-.02em;line-height:1.05;font-weight:700}
  a{color:inherit;text-decoration:none}
  @media (prefers-reduced-motion: reduce){*, *::before, *::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

  .wrap{max-width:560px;text-align:center}
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 16px;border:1px solid var(--line-2);border-radius:999px;
    font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-2);
    margin-bottom:32px;
  }
  .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .code{
    font-family:'Clash Display',sans-serif;
    font-size:clamp(96px,18vw,180px);font-weight:700;line-height:1;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:16px;
  }
  h1{font-size:clamp(28px,5vw,40px);margin-bottom:16px}
  p{color:var(--ink-2);font-size:16px;margin-bottom:32px}
  .ctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:16px 24px;border-radius:999px;font-weight:600;font-size:16px;
    transition:transform .2s, box-shadow .2s, background .2s;
    border:1px solid transparent;min-height:48px;
  }
  .btn svg{width:18px;height:18px}
  .btn-primary{background:var(--accent);color:#06121a;box-shadow:0 10px 28px rgba(62,203,255,.3)}
  .btn-primary:hover{transform:translateY(-2px);background:var(--accent-2)}
  .btn-ghost{background:rgba(255,255,255,.04);border:1px solid var(--line-2);color:var(--ink)}
  .btn-ghost:hover{background:rgba(255,255,255,.08);border-color:var(--accent)}

  .quick{
    margin-top:40px;padding-top:32px;border-top:1px solid var(--line);
    display:flex;gap:24px;justify-content:center;flex-wrap:wrap;
    font-size:14px;color:var(--ink-3);
  }
  .quick a:hover{color:var(--accent)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="badge"><span class="dot"></span>Page not found</div>
    <div class="code">404</div>
    <h1>That page took a wrong turn.</h1>
    <p>Looks like the link peeled off. Head back to the home page, or call the shop if you were looking for a specific service.</p>
    <div class="ctas">
      <a href="/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to home
      </a>
      <a href="tel:+15596683485" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.87.32 1.72.59 2.54a2 2 0 0 1-.45 2.11L8 9.61a16 16 0 0 0 6 6l1.24-1.24a2 2 0 0 1 2.11-.45c.82.27 1.67.47 2.54.59A2 2 0 0 1 22 16.92z"/></svg>
        Call (559) 668-3485
      </a>
    </div>
    <div class="quick">
      <a href="/#services">Services</a>
      <a href="/#gallery">Gallery</a>
      <a href="/#quote">Get a Quote</a>
      <a href="/#location">Visit us</a>
    </div>
  </main>
</body>
</html>
